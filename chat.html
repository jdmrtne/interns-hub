<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#070b14" media="(prefers-color-scheme:dark)">
<meta name="theme-color" content="#e8eef8" media="(prefers-color-scheme:light)">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./favicon.ico">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">

<title>Chat — The Interns Hub</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
.platform-layout{display:flex;height:100vh;overflow:hidden;}
.sidebar-nav{width:var(--nav-w);background:var(--glass);border-right:1px solid var(--glass-border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:300;overflow:hidden;}
/* brand styles inherited from style.css — no overrides here */
.snav-links{flex:1;padding:12px 8px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
.snav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;text-decoration:none;color:var(--text-muted);transition:background .15s,color .15s;white-space:nowrap;font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;}
.snav-item:hover{background:rgba(255,255,255,.05);color:var(--text);}
.snav-item.active{background:rgba(56,189,248,.1);color:var(--primary);border:1px solid rgba(56,189,248,.2);}
.snav-item.admin-only{display:none;}
.snav-footer{padding:12px 8px 16px;border-top:1px solid var(--glass-border);}
.snav-user{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:var(--glass);border:1px solid var(--glass-border);white-space:nowrap;margin-bottom:8px;}
.snav-user-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:12px;font-weight:700;flex-shrink:0;overflow:hidden;}
.snav-user-name{font-family:var(--font-mono);font-size:11px;color:var(--primary);letter-spacing:.06em;overflow:hidden;text-overflow:ellipsis;}
.snav-user-role{font-family:var(--font-mono);font-size:8px;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;}
.btn-logout-nav{width:100%;padding:8px;background:none;border:1px solid var(--glass-border-b);border-radius:6px;font-family:var(--font-mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);cursor:pointer;transition:all .15s;}
.btn-logout-nav:hover{border-color:var(--red);color:var(--red);}
.main-content{margin-left:var(--nav-w);flex:1;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
.page-header{padding:24px 32px 20px;border-bottom:1px solid var(--glass-border);background:var(--glass);position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;gap:16px;}
.page-title{font-family:var(--font-display);font-size:28px;letter-spacing:.1em;color:var(--text);line-height:1;}
.page-subtitle{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);letter-spacing:.12em;text-transform:uppercase;margin-top:4px;}
.page-body{padding:28px 32px;max-width:1200px;flex:1;}
.btn{padding:10px 20px;border-radius:6px;font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .15s;border:none;display:inline-flex;align-items:center;gap:8px;text-decoration:none;white-space:nowrap;}
.btn-primary{background:var(--primary);color:#000;}
.btn-primary:hover{background:#7dd3fc;transform:translateY(-1px);}
.btn-ghost{background:none;border:1px solid var(--glass-border-b);color:var(--text-muted);}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary);}
.btn-danger{background:none;border:1px solid var(--red-dim);color:var(--red);}
.btn-danger:hover{background:rgba(248,81,73,.1);}
.btn-sm{padding:6px 14px;font-size:9px;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.field{margin-bottom:16px;}
.field label{display:block;font-family:var(--font-mono);font-size:9px;letter-spacing:.15em;color:var(--text-muted);text-transform:uppercase;margin-bottom:6px;}
.field input,.field textarea,.field select{width:100%;background:var(--glass);border:1px solid var(--glass-border-b);border-radius:8px;padding:12px 14px;color:var(--text);font-family:var(--font-mono);font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s;resize:vertical;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-g);}
.field input::placeholder,.field textarea::placeholder{color:var(--text-dim);}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-family:var(--font-mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;}
.badge-admin{background:rgba(163,113,247,.15);color:var(--purple);border:1px solid rgba(163,113,247,.3);}
.badge-intern{background:rgba(88,166,255,.1);color:var(--blue);border:1px solid rgba(88,166,255,.2);}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:14px;font-weight:700;flex-shrink:0;}
.avatar-sm{width:28px;height:28px;font-size:10px;}
.card{background:var(--glass);border:1px solid var(--glass-border);border-radius:12px;overflow:hidden;}
.card-header{padding:16px 20px;border-bottom:1px solid var(--glass-border);display:flex;align-items:center;justify-content:space-between;gap:12px;}
.card-title{font-family:var(--font-mono);font-size:10px;letter-spacing:.18em;color:var(--primary);text-transform:uppercase;display:flex;align-items:center;gap:8px;}
.card-title::before{content:"";display:block;width:3px;height:13px;background:var(--primary);border-radius:2px;}
.card-body{padding:20px;}
.tbl-wrap{background:var(--glass);border:1px solid var(--glass-border);border-radius:12px;overflow:hidden;}
.tbl-scroll{overflow-x:auto;max-height:500px;overflow-y:auto;}
.tbl-scroll::-webkit-scrollbar{width:5px;height:5px;}
.tbl-scroll::-webkit-scrollbar-thumb{background:var(--glass-border-b);border-radius:3px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead{position:sticky;top:0;z-index:10;background:var(--glass);}
th{padding:11px 14px;text-align:left;font-family:var(--font-mono);font-size:9px;letter-spacing:.14em;color:var(--text-muted);text-transform:uppercase;border-bottom:1px solid var(--glass-border-b);white-space:nowrap;}
td{padding:11px 14px;border-bottom:1px solid var(--glass-border);font-family:var(--font-mono);font-size:11px;white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.018);}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-dim);}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.4;}
.empty-title{font-family:var(--font-display);font-size:22px;letter-spacing:.1em;color:var(--text-muted);margin-bottom:8px;}
.empty-sub{font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;color:var(--text-dim);}
.toasts{position:fixed;top:16px;right:16px;z-index:2000;display:flex;flex-direction:column;gap:7px;}
.toast{background:var(--glass);border:1px solid var(--glass-border-b);border-radius:8px;padding:10px 16px;font-family:var(--font-mono);font-size:11px;max-width:300px;animation:tsIn .3s ease,tsOut .4s ease 2.6s forwards;}
.toast.ok{border-color:var(--green);color:var(--green);}
.toast.err{border-color:var(--red);color:var(--red);}
.toast.inf{border-color:var(--blue);color:var(--blue);}
@keyframes tsIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes tsOut{from{opacity:1}to{opacity:0;transform:translateX(110%)}}
.loading-overlay{position:fixed;inset:0;z-index:6000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.loading-overlay.hidden{display:none;}
.loading-spinner{width:40px;height:40px;border-radius:50%;border:3px solid var(--glass-border-b);border-top-color:var(--primary);animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);letter-spacing:.15em;text-transform:uppercase;}
.mob-header{display:none;height:56px;background:var(--glass);border-bottom:1px solid var(--glass-border);align-items:center;justify-content:space-between;padding:0 16px;position:sticky;top:0;z-index:300;width:100%;}
.mob-brand{font-family:var(--font-display);font-size:22px;letter-spacing:.1em;color:var(--primary);}
.mob-menu-btn{background:none;border:none;color:var(--text-muted);font-size:22px;cursor:pointer;padding:4px;}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:290;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px;}
.stat-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:10px;padding:20px;}
.stat-label{font-family:var(--font-mono);font-size:9px;letter-spacing:.16em;color:var(--text-dim);text-transform:uppercase;margin-bottom:8px;}
.stat-value{font-family:var(--font-display);font-size:32px;letter-spacing:.05em;color:var(--primary);line-height:1;}
@media(max-width:768px){.sidebar-nav{transform:translateX(-100%);transition:transform .25s;}.sidebar-nav.open{transform:translateX(0);}.sidebar-overlay.show{display:block;}.main-content{margin-left:0;height:calc(100vh - 56px);overflow:hidden;}.mob-header{display:flex;}.page-body{padding:20px 16px;}.page-header{padding:16px;}.page-title{font-size:22px;}.platform-layout{flex-direction:column;height:100vh;}.chat-layout{flex:1;height:100%;overflow:hidden;}}


.chat-layout{display:flex;flex-direction:column;flex:1;height:100%;overflow:hidden;}
.chat-topbar{padding:12px 20px;background:var(--glass);border-bottom:1px solid var(--glass-border);display:flex;align-items:center;gap:12px;flex-shrink:0;}
.chat-back{background:none;border:1px solid var(--glass-border-b);border-radius:6px;color:var(--text-muted);font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:6px 12px;cursor:pointer;text-decoration:none;transition:all .15s;}
.chat-back:hover{border-color:var(--primary);color:var(--primary);}
.chat-partner-name{font-family:var(--font-mono);font-size:14px;color:var(--text);letter-spacing:.06em;}
.chat-partner-dept{font-family:var(--font-mono);font-size:9px;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;}
.rt-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);animation:blink 2s infinite;margin-left:auto;}
.rt-label{font-family:var(--font-mono);font-size:9px;color:var(--text-dim);letter-spacing:.1em;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.messages-area{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:8px;}
.messages-area::-webkit-scrollbar{width:4px;}
.messages-area::-webkit-scrollbar-thumb{background:var(--glass-border-b);border-radius:3px;}
.msg-bubble{max-width:70%;display:flex;gap:8px;align-items:flex-start;animation:bIn .2s ease;position:relative;}
@keyframes bIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg-bubble.mine{align-self:flex-end;flex-direction:row-reverse;}
.msg-bubble.theirs{align-self:flex-start;}
.bubble-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;font-weight:700;flex-shrink:0;overflow:hidden;}
.btn-del-msg{background:none;border:none;color:var(--text-dim);cursor:pointer;padding:2px 3px;opacity:.4;transition:opacity .15s,color .15s;flex-shrink:0;display:flex;align-items:center;line-height:1;}
.btn-del-msg:hover{opacity:1;color:#f87171;}
.msg-bubble.deleting{opacity:.4;pointer-events:none;transition:opacity .2s;}
.bubble-content--deleted{background:none !important;border-color:var(--glass-border) !important;border-style:dashed !important;}
.bubble-deleted{font-style:italic;color:var(--text-dim);font-size:12px;}
.bubble-content{background:var(--glass);border:1px solid var(--glass-border);border-radius:12px;padding:10px 14px;font-family:var(--font-body);font-size:14px;line-height:1.5;color:var(--text);word-break:break-word;}
.msg-bubble.mine .bubble-content{background:rgba(56,189,248,.12);border-color:rgba(56,189,248,.25);border-radius:12px 4px 12px 12px;}
.msg-bubble.theirs .bubble-content{border-radius:4px 12px 12px 12px;}
.bubble-time{font-family:var(--font-mono);font-size:9px;color:var(--text-dim);margin-top:3px;letter-spacing:.06em;display:flex;align-items:center;gap:4px;}
.msg-bubble.mine .bubble-time{justify-content:flex-end;}
.date-div{text-align:center;font-family:var(--font-mono);font-size:9px;color:var(--text-dim);letter-spacing:.14em;text-transform:uppercase;margin:6px 0;display:flex;align-items:center;gap:10px;}
.date-div::before,.date-div::after{content:"";flex:1;height:1px;background:var(--glass-border);}
.chat-input-bar{padding:14px 20px;background:var(--glass);border-top:1px solid var(--glass-border);display:flex;gap:10px;align-items:flex-end;flex-shrink:0;}
#msgInput{flex:1;background:var(--glass);border:1px solid var(--glass-border-b);border-radius:10px;padding:11px 14px;color:var(--text);font-family:var(--font-body);font-size:14px;outline:none;resize:none;min-height:42px;max-height:120px;transition:border-color .2s,box-shadow .2s;line-height:1.5;}
#msgInput:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-g);}
#msgInput::placeholder{color:var(--text-dim);}
.btn-send{width:42px;height:42px;background:var(--primary);border:none;border-radius:10px;color:#000;font-size:18px;cursor:pointer;transition:background .15s,transform .1s;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.btn-send:hover{background:#7dd3fc;transform:scale(1.05);}
.btn-send:disabled{opacity:.5;cursor:not-allowed;transform:none;}

/* ── SIDEBAR SVG ICON FIX ───────────────────── */
.snav-icon { width: 22px; height: 22px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.snav-icon svg { width: 18px; height: 18px; display: block; }
.snav-item { color: var(--text-muted); }
.snav-item svg { stroke: #58a6ff; }
.snav-item.active svg { stroke: #93c5fd; }
.snav-item:hover svg { stroke: #7dd3fc; }
</style>
<link rel="stylesheet" href="./style.css">
</head>
<body>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="./config.js"></script>
<script src="./nav.js"></script>
<script src="./profile.js"></script>
<script src="./notifications.js"></script>
<script src="./push.js"></script>
<div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div><div class="loading-text">Opening Chat…</div></div>
<div class="toasts" id="toasts"></div>
<div class="platform-layout">
<header class="mob-header" id="mobHeader"><span class="mob-page-title">Chat</span><button class="mob-menu-btn" onclick="toggleMobileNav()" aria-label="Open menu">&#9776;</button></header>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMobileNav()"></div>
<nav class="sidebar-nav" id="sidebarNav">
    <div class="snav-brand">
    <div class="snav-brand-icon" onclick="toggleDesktopNav()" title="Toggle menu">◆</div>
    <div style="flex:1;min-width:0">
      <div class="snav-brand-name">The Interns Hub</div>
      <div class="snav-brand-sub">Intern Portal</div>
    </div>
    <button class="collapse-btn" onclick="toggleDesktopNav()" title="Toggle menu">&#9776;</button>
  </div>
  <button class="collapse-btn-rail" onclick="toggleDesktopNav()" title="Expand menu">&#9776;</button>
  <div class="snav-links" id="navLinks"></div>
  <div class="snav-footer">
    <div class="snav-user"><div class="snav-user-avatar" id="navAvatar"></div><div style="overflow:hidden"><div class="snav-user-name" id="navUserName">Loading…</div><div class="snav-user-role" id="navUserRole">intern</div></div></div>
    <button class="btn-logout-nav" onclick="doLogout()">⏻ Sign Out</button>
  </div>
</nav>
  <main class="main-content">
    <div class="chat-layout">
      <div class="chat-topbar">
        <a href="messages.html" class="chat-back">← Back</a>
        <div class="avatar" id="partnerAv" style="flex-shrink:0"></div>
        <div>
          <div class="chat-partner-name" id="partnerName">Loading…</div>
          <div class="chat-partner-dept" id="partnerDept"></div>
        </div>
        <div class="rt-dot"></div>
        <span class="rt-label">LIVE</span>
      </div>
      <div class="messages-area" id="messagesArea"></div>
      <div class="chat-input-bar">
        <textarea id="msgInput" placeholder="Type a message…" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="btn-send" id="sendBtn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </main>
</div>
<script>

let partnerUser=null,lastDate=null,rtChannel=null,currentUserIsAdmin=false;
async function doLogout(){await sb.auth.signOut();window.location.href='index.html';}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function scrollBottom(){const a=document.getElementById('messagesArea');if(a)a.scrollTop=a.scrollHeight;}
function dateLbl(ts){const _t=(/Z$|[+-]\d{2}:\d{2}$/.test(ts))?ts:ts+'Z';const d=new Date(_t),t=new Date(),y=new Date(t);y.setDate(t.getDate()-1);if(d.toDateString()===t.toDateString())return'Today';if(d.toDateString()===y.toDateString())return'Yesterday';return d.toLocaleDateString([],{weekday:'long',month:'long',day:'numeric'});}
function renderMsg(msg,append=true){
  const area=document.getElementById('messagesArea');
  if(!area)return;
  const isMine=msg.sender_id===currentUser.id;
  const _mts=(/Z$|[+-]\d{2}:\d{2}$/.test(msg.created_at))?msg.created_at:msg.created_at+'Z';
  const ds=new Date(_mts).toDateString();
  if(ds!==lastDate){
    const div=document.createElement('div');
    div.className='date-div';div.textContent=dateLbl(msg.created_at);
    if(append)area.appendChild(div);else area.prepend(div);
    lastDate=ds;
  }
  const _ts=(/Z$|[+-]\d{2}:\d{2}$/.test(msg.created_at))?msg.created_at:msg.created_at+'Z';
  const time=new Date(_ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const el=document.createElement('div');
  el.className='msg-bubble '+(isMine?'mine':'theirs');
  el.dataset.msgId=msg.id;
  const canDelete=isMine||currentUserIsAdmin;
  const trashIcon=`<svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`;
  const delBtn=canDelete?`<button class="btn-del-msg" title="Delete message" onclick="deleteMsg('${msg.id}',this)">${trashIcon}</button>`:'';
  // Avatar next to their bubbles
  const avatarHtml = !isMine
    ? (partnerUser?.avatar_url
        ? `<div class="bubble-av" style="overflow:hidden;border-radius:50%;flex-shrink:0"><img src="${partnerUser.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"></div>`
        : `<div class="bubble-av" style="background:${pcol}20;color:${pcol}">${avatarInitials(partnerUser?.name||'')}</div>`)
    : '';
  if(msg.is_deleted){
    el.innerHTML=avatarHtml+`<div><div class="bubble-content bubble-content--deleted"><span class="bubble-deleted">Message deleted</span></div></div>`;
  }else{
    el.innerHTML=avatarHtml+`<div><div class="bubble-content">${escHtml(msg.message)}</div><div class="bubble-time">${time}${delBtn}</div></div>`;
  }
  if(append){area.appendChild(el);scrollBottom();}else area.prepend(el);
}

let currentUser;
function fmtDate(ts){if(!ts)return'—';return new Date(ts).toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'});}
function toast(msg,type='inf'){let c=document.getElementById('toasts');if(!c){c=document.createElement('div');c.id='toasts';c.className='toasts';document.body.appendChild(c);}const d=document.createElement('div');d.className='toast '+type;d.textContent=msg;c.appendChild(d);setTimeout(()=>d.remove(),3100);}
// ─── Nav Icons (Lucide SVG) ───────────────────────────────────────────────────
async function deleteMsg(id,btn){
  if(!confirm('Delete this message?'))return;
  const bubble=btn.closest('.msg-bubble');
  bubble.classList.add('deleting');
  const{error}=await sb.from('messages').update({is_deleted:true,message:'deleted'}).eq('id',id);
  if(error){toast('Failed to delete: '+error.message,'err');bubble.classList.remove('deleting');return;}
  applyDeleteToUI(id);
}
async function loadMessages(){
  const area=document.getElementById('messagesArea');area.innerHTML='';lastDate=null;
  const{data}=await sb.from('messages').select('*').or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${partnerUser.id}),and(sender_id.eq.${partnerUser.id},receiver_id.eq.${currentUser.id})`).order('created_at',{ascending:true});
  if(!data||!data.length){area.innerHTML='<div style="text-align:center;padding:40px;font-family:var(--font-mono);font-size:11px;color:var(--text-dim)">No messages yet — say hello!</div>';return;}
  for(const m of data)renderMsg(m,true);scrollBottom();
}
async function sendMessage(){
  const inp=document.getElementById('msgInput'),text=inp.value.trim();
  if(!text)return;
  const btn=document.getElementById('sendBtn');btn.disabled=true;inp.value='';inp.style.height='auto';

  // ── Step 3 debug: verify session before sending ──
  const{data:{session}}=await sb.auth.getSession();
  console.log('[Chat] session:', session);
  console.log('[Chat] sender_id:', session?.user?.id);
  console.log('[Chat] receiver_id:', partnerUser?.id);

  if(!session){
    toast('Session expired — please sign in again','err');
    btn.disabled=false;inp.value=text;
    setTimeout(()=>window.location.href='index.html',1500);
    return;
  }

  // Keep currentUser in sync with the live session
  currentUser=session.user;

  const{error}=await sb.from('messages').insert({
    sender_id:currentUser.id,
    receiver_id:partnerUser.id,
    message:text
  });
  btn.disabled=false;
  if(error){
    console.error('[Chat] Full error:', JSON.stringify(error));
    toast('Failed to send: '+error.message,'err');
    inp.value=text;
  }
  inp.focus();
}
let _chatAudioCtx=null,_chatAudioBuf=null,_chatAudioReady=false;
(function(){
  try{
    _chatAudioCtx=new(window.AudioContext||window.webkitAudioContext)();
    fetch('./notification.mp3')
      .then(r=>r.ok?r.arrayBuffer():Promise.reject())
      .then(b=>_chatAudioCtx.decodeAudioData(b))
      .then(d=>{_chatAudioBuf=d;_chatAudioReady=true;})
      .catch(e=>console.warn('[Chat] notification.mp3 failed:',e));
  }catch(e){}
  ['click','touchstart','keydown'].forEach(ev=>document.addEventListener(ev,()=>{
    if(_chatAudioCtx&&_chatAudioCtx.state==='suspended')_chatAudioCtx.resume();
  },{passive:true}));
})();
function playMsgSound(){
  if(!_chatAudioReady||!_chatAudioBuf)return;
  try{
    if(_chatAudioCtx.state==='suspended')_chatAudioCtx.resume();
    const s=_chatAudioCtx.createBufferSource();
    s.buffer=_chatAudioBuf;s.connect(_chatAudioCtx.destination);s.start(0);
  }catch(e){}
}
function applyDeleteToUI(msgId){
  const bubble=document.querySelector(`[data-msg-id="${msgId}"]`);
  if(!bubble)return;
  const content=bubble.querySelector('.bubble-content');
  const timeEl=bubble.querySelector('.bubble-time');
  if(content){content.className='bubble-content bubble-content--deleted';content.innerHTML='<span class="bubble-deleted">Message deleted</span>';}
  if(timeEl)timeEl.remove();
  bubble.classList.remove('deleting');
}
function setupRealtime(){
  rtChannel=sb.channel('chat-'+[currentUser.id,partnerUser.id].sort().join('-'))
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},payload=>{
      const m=payload.new;
      if((m.sender_id===currentUser.id&&m.receiver_id===partnerUser.id)||(m.sender_id===partnerUser.id&&m.receiver_id===currentUser.id)){
        renderMsg(m,true);
        if(m.sender_id!==currentUser.id)playMsgSound();
      }
    })
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'messages'},payload=>{
      const m=payload.new;
      if(m&&m.is_deleted&&((m.sender_id===currentUser.id&&m.receiver_id===partnerUser.id)||(m.sender_id===partnerUser.id&&m.receiver_id===currentUser.id))){
        applyDeleteToUI(m.id);
      }
    })
    .subscribe();
}
async function boot(){
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const{data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='index.html';return;}
  currentUser=session.user;
  const params=new URLSearchParams(window.location.search),pid=params.get('uid');
  if(!pid){window.location.href='messages.html';return;}
  const{data:p}=await sb.from('users').select('*').eq('id',currentUser.id).single();
  const isAdmin=p?.role==='admin';
  currentUserIsAdmin=isAdmin;
  document.getElementById('navLinks').innerHTML=renderNav('messages',isAdmin);
  const name=p?.name||currentUser.email?.split('@')[0]||'Intern';
  document.getElementById('navUserName').textContent=name;document.getElementById('navUserRole').textContent=p?.role||'intern';
  const av=document.getElementById('navAvatar');
  if(p?.avatar_url){
    av.innerHTML=`<img src="${p.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
  } else {
    const col=avatarColor(name);av.style.background=col+'20';av.style.color=col;av.textContent=avatarInitials(name);
  }
  enableSidebarProfileClick(sb, currentUser.id, p);
  const{data:partner}=await sb.from('users').select('*').eq('id',pid).single();
  if(!partner){toast('User not found','err');window.location.href='messages.html';return;}
  partnerUser=partner;
  const pcol=avatarColor(partner.name),pav=document.getElementById('partnerAv');
  if(partner.avatar_url){
    pav.style.background='transparent';pav.style.overflow='hidden';
    pav.innerHTML=`<img src="${partner.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
  } else {
    pav.style.background=pcol+'20';pav.style.color=pcol;pav.textContent=avatarInitials(partner.name);
  }
  document.getElementById('partnerName').textContent=partner.name||'Unknown';
  document.getElementById('partnerDept').textContent=(partner.department||'No department').toUpperCase();
  document.title=partner.name+' — The Intern Hub';
  await loadMessages();setupRealtime();
  document.getElementById('loadingOverlay').classList.add('hidden');
  document.getElementById('msgInput').focus();
}
boot();
</script>
